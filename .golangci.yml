version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      check-blank: false
      exclude-functions:
        - (io.Closer).Close
        - (net.Listener).Close
        - (*net/http.Server).Shutdown
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os/exec.Cmd).Start
